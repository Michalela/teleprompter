<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Teleprompter</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
  overflow:hidden;
}

#controls {
  position:fixed;
  top:10px;
  left:10px;
  right:10px;
  z-index:10;
}

textarea {
  width:100%;
  height:120px;
  padding:10px;
  font-size:16px;
  border-radius:8px;
}

button, input, select {
  margin-top:10px;
  padding:10px;
}

#teleprompter {
  position:absolute;
  width:100%;
  bottom:-100%;
  text-align:center;
  font-size:40px;
  padding:20px;
  line-height:1.6;
}

#guide {
  position:fixed;
  top:40%;
  left:0;
  right:0;
  text-align:center;
  opacity:0.5;
}

#badge {
  position:fixed;
  top:5px;
  right:10px;
  font-size:12px;
  opacity:0.6;
}
</style>
</head>

<body>

<div id="controls">
  <textarea id="textInput">Paste your script here...</textarea><br>

  <button onclick="start()">Play</button>
  <button onclick="stop()">Pause</button>
  <button onclick="toggleMirror()">Mirror</button>

  <br>

  Speed:
  <input type="range" id="speed" min="1" max="10" value="3">

  <br>

  Font:
  <input type="range" id="font" min="20" max="80" value="40">

  <br>

  Language:
  <select id="language">
    <option value="en">English</option>
    <option value="es">Spanish</option>
    <option value="pt">Portuguese</option>
    <option value="fr">French</option>
    <option value="de">German</option>
    <option value="it">Italian</option>
    <option value="ar">Arabic</option>
    <option value="ht">Haitian Creole</option>
  </select>

  <button onclick="translateText()">Translate</button>
</div>

<div id="badge">Creator Edition</div>
<div id="guide">Look Here</div>
<div id="teleprompter"></div>

<script>
let interval;
let position = -window.innerHeight;

function start() {
  const text = document.getElementById("textInput").value;
  const tele = document.getElementById("teleprompter");
  tele.innerText = text;
  position = window.innerHeight;

  interval = setInterval(() => {
    let speed = document.getElementById("speed").value;
    position -= speed;
    tele.style.bottom = position + "px";
  }, 30);
}

function stop() {
  clearInterval(interval);
}

function toggleMirror() {
  const tele = document.getElementById("teleprompter");
  tele.style.transform =
    tele.style.transform === "scaleX(-1)" ? "scaleX(1)" : "scaleX(-1)";
}

document.getElementById("font").oninput = function() {
  document.getElementById("teleprompter").style.fontSize =
    this.value + "px";
};

async function translateText() {
  const text = document.getElementById("textInput").value;
  const lang = document.getElementById("language").value;

  const res = await fetch(
    "https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=" +
      lang +
      "&dt=t&q=" +
      encodeURIComponent(text)
  );

  const data = await res.json();
  let translated = data[0].map(t => t[0]).join("");

  document.getElementById("textInput").value = translated;
}
</script>

</body>
</html>
